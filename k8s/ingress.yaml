apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retailpulse-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: retailpulse.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: retailpulse-streamlit
                port:
                  number: 8501
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: retailpulse-api
                port:
                  number: 8000
